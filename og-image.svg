<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>

    <!-- Name text gradient (matches your hero heading) -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- CTA / accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <!-- Decorative glow -->
    <radialGradient id="glowOrb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative glow orbs -->
  <ellipse cx="200" cy="150" rx="300" ry="250" fill="url(#glowOrb1)"/>
  <ellipse cx="1000" cy="480" rx="280" ry="220" fill="url(#glowOrb2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Favicon-style logo badge -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="14" fill="url(#accentGrad)"/>
    <text x="32" y="42" font-family="monospace" font-size="28" font-weight="bold" fill="white" text-anchor="middle">&lt;N&gt;</text>
  </g>

  <!-- Name -->
  <text x="80" y="230" font-family="'DM Sans', 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="url(#nameGrad)">
    Nikitha B
  </text>

  <!-- Title -->
  <text x="80" y="290" font-family="'DM Sans', 'Segoe UI', sans-serif" font-size="30" fill="#22d3ee" font-weight="600">
    Jr. Software Developer
  </text>

  <!-- Description -->
  <text x="80" y="345" font-family="'DM Sans', 'Segoe UI', sans-serif" font-size="22" fill="#9ca3af">
    Full Stack &amp; Mobile App Developer specializing in
  </text>
  <text x="80" y="378" font-family="'DM Sans', 'Segoe UI', sans-serif" font-size="22" fill="#9ca3af">
    React Native, React JS, Nest.js &amp; MongoDB
  </text>

  <!-- Tech pill badges -->
  <g transform="translate(80, 420)">
    <!-- React Native -->
    <rect x="0" y="0" width="160" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="80" y="25" font-family="'Space Mono', monospace" font-size="14" fill="#a5b4fc" text-anchor="middle">React Native</text>

    <!-- React JS -->
    <rect x="175" y="0" width="120" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1"/>
    <text x="235" y="25" font-family="'Space Mono', monospace" font-size="14" fill="#c4b5fd" text-anchor="middle">React JS</text>

    <!-- Nest.js -->
    <rect x="310" y="0" width="120" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ec4899" stroke-opacity="0.4" stroke-width="1"/>
    <text x="370" y="25" font-family="'Space Mono', monospace" font-size="14" fill="#f9a8d4" text-anchor="middle">Nest.js</text>

    <!-- MongoDB -->
    <rect x="445" y="0" width="120" height="38" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1"/>
    <text x="505" y="25" font-family="'Space Mono', monospace" font-size="14" fill="#67e8f9" text-anchor="middle">MongoDB</text>
  </g>

  <!-- Gold Medalist badge -->
  <g transform="translate(80, 490)">
    <rect x="0" y="0" width="200" height="38" rx="19" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
    <text x="24" y="25" font-family="'DM Sans', sans-serif" font-size="15" fill="#fbbf24">&#9733; Gold Medalist</text>
  </g>

  <!-- Website URL -->
  <text x="80" y="580" font-family="'Space Mono', monospace" font-size="18" fill="#6b7280">
    nikitha.online
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative code brackets on the right side -->
  <g transform="translate(900, 180)" opacity="0.06">
    <text font-family="monospace" font-size="280" fill="white">{ }</text>
  </g>
</svg>
